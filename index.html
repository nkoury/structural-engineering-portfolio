<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Noah Koury | Structural Engineering Portfolio</title>
    <meta
      name="description"
      content="Structural engineering portfolio for Noah Koury, featuring project case studies, 3D models, drawings, analysis, and calculations."
    />
    <meta property="og:title" content="Noah Koury | Structural Engineering Portfolio" />
    <meta
      property="og:description"
      content="A project gallery and case-study portfolio for structural engineering work."
    />
    <meta name="theme-color" content="#f7f3eb" />
    <link rel="stylesheet" href="css/styles.css" />

    <main>
      <section class="landing" id="top" aria-labelledby="site-title">

        <a class="enter-link" href="#gallery">Enter</a>

          <nav data-project-ribbon></nav>

          </p>
        </div>

        <div class="collage-grid" data-collage-grid></div>

    </main>

    <footer class="site-footer">
      <p>&copy; <span data-current-year></span> Noah Koury</p>
      <a href="mailto:your.email@example.com">Contact</a>
